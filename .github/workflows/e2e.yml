# =============================================================================
# E2E - iOS Integration Tests (pre-publish)
# =============================================================================
#
# Stage: RC-E2E in appsflyer-mobile-plugin-tooling/contracts/rc-release-contract.md.
#
# Runs the .af-e2e/test-plan.json scenarios against the plugin source
# (example/ app linked to appsflyer_sdk via path: ..). Drives the unified
# scripts/af-smoke-runner.sh on an iOS simulator.
#
# Triggers:
#   - workflow_call from rc-release.yml (the gate before publish-rc)
#   - workflow_dispatch for manual reruns and ad-hoc validation
#   - Weekly cron (Sunday 02:00 UTC) to catch SDK / Flutter drift
#
# Reports land in .af-e2e/reports/ and are uploaded as e2e-ios-<run> artifacts.
# Check name (E2E - Full Integration Tests) is what RELEASE_USER_MANUAL.md and
# rc-release.yml expect.
# =============================================================================

name: E2E - Full Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

concurrency:
  group: e2e-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-14

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🧭 Select Xcode version
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE"
          xcodebuild -version

      - name: 📱 Boot iOS simulator (iPhone 15)
        run: |
          UDID=$(xcrun simctl list devices available 2>/dev/null \
            | grep "iPhone 15" | grep -v "Plus\|Pro\|Max" \
            | grep -oE '[A-F0-9-]{36}' | head -1)
          if [[ -z "$UDID" ]]; then
            echo "iPhone 15 not found; falling back to first available iPhone."
            UDID=$(xcrun simctl list devices available 2>/dev/null \
              | grep "iPhone" | grep -oE '[A-F0-9-]{36}' | head -1)
          fi
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "IOS_SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: 🗃 Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: pods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: 📦 Install plugin dependencies
        run: flutter pub get

      - name: 📦 Install example app dependencies
        working-directory: example
        run: flutter pub get

      - name: 📦 Install CocoaPods
        working-directory: example/ios
        run: pod install

      - name: 🔐 Write example/.env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s\n' "$ENV_FILE" > example/.env

      - name: 🗃 Cache iOS build output
        uses: actions/cache@v4
        with:
          path: example/build/ios
          key: ios-build-${{ hashFiles('ios/**', 'lib/**', 'example/lib/**', 'example/ios/**', 'pubspec.yaml') }}
          restore-keys: ios-build-

      - name: 🏗 Build iOS simulator app (debug)
        working-directory: example
        run: flutter build ios --simulator --debug

      - name: 🧪 Run E2E (af-smoke-runner against .af-e2e/test-plan.json)
        run: ./scripts/af-smoke-runner.sh --platform ios --plan .af-e2e/test-plan.json

      - name: 🧾 Dump iOS QA log file (debug)
        if: always()
        run: |
          SIM_DATA="$HOME/Library/Developer/CoreSimulator/Devices/$IOS_SIMULATOR_UDID/data"
          LOG=$(find "$SIM_DATA/Containers/Data/Application" -name "af_qa_logs.txt" 2>/dev/null | head -1)
          echo "=== QA log: ${LOG:-not found} ==="
          cat "$LOG" 2>/dev/null | head -200 || echo "(empty)"

      - name: 📤 Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-${{ github.run_number }}
          path: .af-e2e/reports/
          retention-days: 30
