# =============================================================================
# E2E Test Workflow — iOS Integration Tests
# =============================================================================
#
# Runs all 3 phases on iOS simulator:
#   Phase 1 — Smoke: SDK init, API calls, events, HTTP 200 validation
#   Phase 2 — Background deep link: onDeepLinking FOUND + LAUNCH HTTP 200
#   Phase 3 — Foreground deep link: fresh install + onPause cycle + FOUND
#
# Note: Android emulator is not supported on GitHub-hosted macos runners
# (HVF/nested virtualization not available). Use a self-hosted runner for Android.
#
# Triggers:
#   - Push to POC branch
#   - Manual (workflow_dispatch)
#   - Weekly scheduled (Sunday 02:00 UTC)
#   - Can be called from other workflows (workflow_call)
# =============================================================================

name: E2E — Full Integration Tests

on:
  push:
    branches:
      - POC/AI-Agent-Version-Update

  workflow_dispatch:

  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC

  workflow_call:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests (iOS)
    runs-on: macos-14

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── iOS simulator ───────────────────────────────────────────────────────
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Boot iOS simulator (iPhone 15)
        run: |
          UDID=$(xcrun simctl list devices available 2>/dev/null \
            | grep "iPhone 15" | grep -v "Plus\|Pro\|Max" \
            | grep -oE '[A-F0-9-]{36}' | head -1)
          if [[ -z "$UDID" ]]; then
            echo "iPhone 15 not found, using first available iPhone"
            UDID=$(xcrun simctl list devices available 2>/dev/null \
              | grep "iPhone" | grep -oE '[A-F0-9-]{36}' | head -1)
          fi
          echo "Booting simulator UDID: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "IOS_SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      # ── Cache CocoaPods ───────────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: pods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: pods-

      # ── Install dependencies ─────────────────────────────────────────────
      - name: Install plugin dependencies
        run: flutter pub get

      - name: Install example app dependencies
        working-directory: example
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: example/ios
        run: pod install

      # ── Create .env file from secret ─────────────────────────────────────
      - name: Create example .env file
        run: echo "${{ secrets.ENV_FILE }}" > example/.env

      # ── Build iOS simulator app ──────────────────────────────────────────
      - name: Build iOS simulator app (debug)
        working-directory: example
        run: flutter build ios --simulator --debug

      # ── Clear old reports ────────────────────────────────────────────────
      - name: Clear previous E2E reports
        run: rm -f .claude/e2e-reports/full_e2e_report_*.json

      # ── Run E2E tests (iOS only) ─────────────────────────────────────────
      - name: Run E2E tests
        run: ./scripts/run_full_e2e.sh --no-build --ios-only

      # ── Upload report artifact ──────────────────────────────────────────
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_number }}
          path: .claude/e2e-reports/full_e2e_report_*.json
          retention-days: 30

      # ── Post summary to job output ───────────────────────────────────────
      - name: Print latest report
        if: always()
        run: |
          REPORT=$(ls -t .claude/e2e-reports/full_e2e_report_*.json 2>/dev/null | head -1)
          if [[ -n "$REPORT" ]]; then
            echo "=== E2E Report: $(basename $REPORT) ==="
            cat "$REPORT"
          else
            echo "No report file found"
          fi
