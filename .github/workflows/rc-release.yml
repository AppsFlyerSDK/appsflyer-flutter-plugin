# =============================================================================
# RC (Release Candidate) Workflow - Pre-Production Release
# =============================================================================
# 
# Purpose: Creates a release candidate for QA testing before production release.
# This workflow is triggered when a release branch is created or manually.
#
# What it does:
# 1. Validates the release branch naming convention
# 2. Runs full CI pipeline (tests + builds)
# 3. Updates version numbers in relevant files
# 4. Creates a pre-release tag on GitHub
# 5. Optionally notifies team via Slack (placeholder for future)
#
# Branch Convention: releases/X.x.x/X.Y.x/X.Y.Z[-rcN][+build]
# Examples: 
#   - releases/6.x.x/6.18.x/6.18.0-rc1
#   - releases/6.x.x/6.17.x/6.17.4+1-rc1
#   - releases/6.x.x/6.17.x/6.17.4+1
# Where: X, Y, Z are version numbers, lowercase 'x' is literal,
#        -rcN is optional for release candidates, +build is optional build number
#
# Triggers:
# - Push to branches matching releases/** pattern
# - Manual workflow dispatch with version input
#
# =============================================================================

name: RC - Release Candidate

on:
  # Manual-only triggering with required parameters
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to create the release branch from (e.g., development)'
        required: false
        default: development
        type: string
      flutter_version:
        description: 'Flutter plugin version for this RC (e.g., 6.18.0-rc1 or 6.18.0+1-rc1)'
        required: true
        type: string
      ios_sdk_version:
        description: 'iOS native AppsFlyer SDK version (e.g., 6.17.7)'
        required: true
        type: string
      android_sdk_version:
        description: 'Android native AppsFlyer SDK version (e.g., 6.17.4)'
        required: true
        type: string
      skip_unit:
        description: 'Skip the unit/lint/format job inside Lint, Test & Build (release builds still run; failure of this leg blocks publish, skipped passes)'
        required: false
        type: boolean
        default: false
      skip_builds:
        description: 'Skip the Android + iOS release builds inside Lint, Test & Build (unit job still runs; failure of this leg blocks publish, skipped passes)'
        required: false
        type: boolean
        default: false
      skip_e2e:
        description: 'Skip RC-E2E iOS + Android jobs (BLOCKS publish-rc — used for fast iteration on the rest of the pipeline)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Do not publish RC to pub.dev (still opens PR and creates prerelease)'
        required: false
        type: boolean
        default: true

# Prevent multiple RC workflows from running simultaneously
concurrency:
  group: rc-release-${{ github.run_id }}-${{ github.event.inputs.flutter_version || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Validate Release Branch
  # ===========================================================================
  # Ensures the branch follows naming conventions and extracts version info
  # ===========================================================================
  
  validate-release:
    name: 🔍 Validate Inputs & Compute Branch
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.compute.outputs.version }}
      base_version: ${{ steps.compute.outputs.base_version }}
      podspec_version: ${{ steps.compute.outputs.podspec_version }}
      is_rc: ${{ steps.compute.outputs.is_rc }}
      is_valid: ${{ steps.compute.outputs.is_valid }}
      base_branch: ${{ steps.compute.outputs.base_branch }}
      release_branch: ${{ steps.compute.outputs.release_branch }}
      ios_sdk_version: ${{ steps.compute.outputs.ios_sdk_version }}
      android_sdk_version: ${{ steps.compute.outputs.android_sdk_version }}
      # Normalised dry_run. Resolved in its own step so it survives even if
      # the later `compute` step exits 1 on bad inputs, which means the
      # notify-team failure Slack always sees a defined value. Mirrors the
      # same pattern in production-release.yml so the two workflows stay
      # aligned on naming and resolution semantics.
      is_dry_run: ${{ steps.dry-run.outputs.value }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve dry_run across trigger paths
        id: dry-run
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_DRY: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # Normalise dry_run into a string 'true'/'false' so downstream
          # `!= 'true'` checks behave consistently. Today only
          # workflow_dispatch fires this workflow; the case statement keeps
          # the door open for future workflow_call additions without
          # re-introducing the production-release-style bug.
          case "$EVENT_NAME" in
            workflow_dispatch)
              if [[ "$DISPATCH_DRY" == "true" ]]; then
                echo "value=true" >> "$GITHUB_OUTPUT"
              else
                echo "value=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              # Any other trigger: real run, never dry.
              echo "value=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Validate and compute
        id: compute
        env:
          VERSION: ${{ github.event.inputs.flutter_version }}
          IOS_VER: ${{ github.event.inputs.ios_sdk_version }}
          AND_VER: ${{ github.event.inputs.android_sdk_version }}
          BASE_BRANCH_INPUT: ${{ github.event.inputs.base_branch }}
        run: |
          set -euo pipefail

          if [[ -z "$VERSION" || -z "$IOS_VER" || -z "$AND_VER" ]]; then
            echo "❌ Missing required inputs"; exit 1
          fi

          # Validate formats
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?-rc[0-9]+$ ]]; then
            echo "❌ flutter_version must be a prerelease like X.Y.Z[-build]+?-rcN (e.g., 6.18.0-rc1 or 6.18.0+1-rc1)"; exit 1
          fi
          if [[ ! $IOS_VER =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ios_sdk_version must be X.Y.Z"; exit 1
          fi
          if [[ ! $AND_VER =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ android_sdk_version must be X.Y.Z"; exit 1
          fi

          # Compute base version (remove -rcN), keep +build if present
          BASE_VERSION=$(echo "$VERSION" | sed 's/-rc[0-9]*$//')
          # Podspec version must remove both +build and -rcN
          PODSPEC_VERSION=$(echo "$VERSION" | sed -E 's/(\+[0-9]+)?(-rc[0-9]+)?$//')

          MAJOR_MINOR=$(echo "$BASE_VERSION" | grep -oE '^[0-9]+\.[0-9]+')
          MAJOR=$(echo "$BASE_VERSION" | grep -oE '^[0-9]+')
          RELEASE_BRANCH="releases/${MAJOR}.x.x/${MAJOR_MINOR}.x/${VERSION}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "podspec_version=$PODSPEC_VERSION" >> $GITHUB_OUTPUT
          echo "is_rc=true" >> $GITHUB_OUTPUT
          echo "is_valid=true" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH_INPUT" >> $GITHUB_OUTPUT
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT
          echo "ios_sdk_version=$IOS_VER" >> $GITHUB_OUTPUT
          echo "android_sdk_version=$AND_VER" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Job 2: Run Lint, Test & Build (gated via pre-publish-gate)
  # ===========================================================================
  # Reuses lint-test-build.yml. Runs in parallel with prepare-branch + E2E
  # since release-mode build coverage is independent of the version bumps and
  # E2E covers debug-build coverage. Result feeds into pre-publish-gate:
  # failure here blocks publish-rc; skipped (skip_unit/skip_builds) passes.
  # Note: tests run against the dispatched base branch (e.g. development),
  # not the release branch — by design, since the release branch only adds
  # version-string bumps that the unit tests do not cover.
  # ===========================================================================

  run-ci:
    name: 🚀 Lint, Test & Build
    needs: validate-release
    if: ${{ needs.validate-release.outputs.is_valid == 'true' }}
    uses: ./.github/workflows/lint-test-build.yml
    with:
      skip_unit: ${{ github.event.inputs.skip_unit == 'true' }}
      skip_builds: ${{ github.event.inputs.skip_builds == 'true' }}
    secrets: inherit

  # ===========================================================================
  # Job 3: Create/Update Release Branch and Apply Changes
  # ===========================================================================
  
  prepare-branch:
    name: 🌿 Create Release Branch & Apply Changes
    runs-on: ubuntu-latest
    # No dependency on run-ci. Lint, Test & Build runs in parallel; its
    # result feeds into pre-publish-gate, not into prepare-branch. Keeps the
    # critical path validate -> prepare -> e2e -> publish-rc as short as
    # possible while still gating publish on Lint/Test/Build via the gate.
    needs: [validate-release]
    if: always() && needs.validate-release.outputs.is_valid == 'true'
    outputs:
      release_branch: ${{ steps.push.outputs.release_branch }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.base_branch }}
          fetch-depth: 0

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create release branch
        id: branch
        run: |
          set -e
          REL_BRANCH="${{ needs.validate-release.outputs.release_branch }}"
          echo "Target release branch: $REL_BRANCH"
          if git ls-remote --exit-code --heads origin "$REL_BRANCH" >/dev/null 2>&1; then
            echo "Branch already exists on remote. Checking it out."
            git fetch origin "$REL_BRANCH":"$REL_BRANCH"
            git checkout "$REL_BRANCH"
          else
            git checkout -b "$REL_BRANCH"
          fi

      - name: Update pubspec.yaml version (RC full)
        run: |
          VERSION='${{ needs.validate-release.outputs.version }}'
          echo "Setting pubspec.yaml version to $VERSION (includes -rcN)"
          sed -i.bak "s/^version: .*/version: $VERSION/" pubspec.yaml
          rm pubspec.yaml.bak
          grep "^version:" pubspec.yaml

      - name: Update Android SDK dependency
        run: |
          AND_VER='${{ needs.validate-release.outputs.android_sdk_version }}'
          sed -i.bak "s/com.appsflyer:af-android-sdk:[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/com.appsflyer:af-android-sdk:${AND_VER}/" android/build.gradle
          rm android/build.gradle.bak
          grep "af-android-sdk:" -n android/build.gradle | head -1

      - name: Update iOS podspec version and dependencies
        run: |
          PODSPEC_VERSION='${{ needs.validate-release.outputs.podspec_version }}'
          IOS_VER='${{ needs.validate-release.outputs.ios_sdk_version }}'
          FILE='ios/appsflyer_sdk.podspec'
          if [ -f "$FILE" ]; then
            sed -i.bak "s/s\.version\s*=\s*'.*'/s.version          = '${PODSPEC_VERSION}'/" "$FILE"
            sed -i.bak "s/ss\.ios\.dependency 'AppsFlyerFramework','[^']*'/ss.ios.dependency 'AppsFlyerFramework','${IOS_VER}'/" "$FILE"
            # PurchaseConnector line may or may not exist
            if grep -q "PurchaseConnector', '" "$FILE"; then
              sed -i.bak "s/ss\.ios\.dependency 'PurchaseConnector', '[^']*'/ss.ios.dependency 'PurchaseConnector', '${IOS_VER}'/" "$FILE" || true
            fi
            rm ${FILE}.bak || true
            echo "Updated podspec lines:"
            grep -n "s.version\|AppsFlyerFramework\|PurchaseConnector" "$FILE" || true
          else
            echo "⚠️ $FILE not found"
          fi

      - name: Update plugin version constants (Android/iOS/Dart)
        run: |
          VERSION='${{ needs.validate-release.outputs.version }}'
          echo "Updating PLUGIN_VERSION constants to: $VERSION"

          # Android - AppsFlyerConstants.java
          ANDROID_FILE="android/src/main/java/com/appsflyer/appsflyersdk/AppsFlyerConstants.java"
          if [ -f "$ANDROID_FILE" ]; then
            sed -i.bak "s/PLUGIN_VERSION = \".*\"/PLUGIN_VERSION = \"$VERSION\"/" "$ANDROID_FILE"
            rm "$ANDROID_FILE.bak"
            echo "✅ Android:" && grep "PLUGIN_VERSION" "$ANDROID_FILE"
          fi

          # Dart - appsflyer_constants.dart
          DART_FILE="lib/src/appsflyer_constants.dart"
          if [ -f "$DART_FILE" ]; then
            sed -i.bak "s/PLUGIN_VERSION = \".*\"/PLUGIN_VERSION = \"$VERSION\"/" "$DART_FILE"
            rm "$DART_FILE.bak"
            echo "✅ Dart:" && grep "PLUGIN_VERSION" "$DART_FILE"
          fi

          # iOS - AppsflyerSdkPlugin.h (#define)
          IOS_FILE="ios/Classes/AppsflyerSdkPlugin.h"
          if [ -f "$IOS_FILE" ]; then
            sed -i.bak 's/kAppsFlyerPluginVersion[[:space:]]*@"[^"]*"/kAppsFlyerPluginVersion             @"'"$VERSION"'"/' "$IOS_FILE"
            rm "$IOS_FILE.bak"
            echo "✅ iOS:" && grep "kAppsFlyerPluginVersion" "$IOS_FILE"
          fi

      - name: Update README SDK and Purchase Connector versions
        run: |
          IOS_VER='${{ needs.validate-release.outputs.ios_sdk_version }}'
          AND_VER='${{ needs.validate-release.outputs.android_sdk_version }}'

          # Main SDK versions
          sed -i.bak -E "s/- Android AppsFlyer SDK \*\*v[0-9.]+\*\*/- Android AppsFlyer SDK **v${AND_VER}**/" README.md
          sed -i.bak -E "s/- iOS AppsFlyer SDK \*\*v[0-9.]+\*\*/- iOS AppsFlyer SDK **v${IOS_VER}**/" README.md

          # Purchase Connector versions (extract from build files)
          AND_PC=$(grep "purchase-connector:" android/build.gradle | sed -n "s/.*purchase-connector:\([^']*\).*/\1/p" | head -1)
          IOS_PC=$(grep "PurchaseConnector" ios/appsflyer_sdk.podspec | sed -n "s/.*PurchaseConnector',.*'\([^']*\)'.*/\1/p" | head -1)

          if [ -n "$AND_PC" ]; then
            sed -i.bak -E "/^### Purchase Connector/,/^##|^$/{s/^- Android [0-9.]+$/- Android ${AND_PC}/;}" README.md
          fi
          if [ -n "$IOS_PC" ]; then
            sed -i.bak -E "/^### Purchase Connector/,/^##|^$/{s/^- iOS [0-9.]+$/- iOS ${IOS_PC}/;}" README.md
          fi

          rm -f README.md.bak
          echo "README updated versions:"
          sed -n '/## SDK Versions/,/## ❗/p' README.md | head -12

      - name: Commit & push changes
        id: push
        run: |
          set -e
          REL_BRANCH='${{ needs.validate-release.outputs.release_branch }}'
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [[ -n $(git status -s) ]]; then
            git add pubspec.yaml android/ ios/ README.md || true
            git commit -m "chore: prepare RC ${VERSION} (iOS ${{ needs.validate-release.outputs.ios_sdk_version }}, Android ${{ needs.validate-release.outputs.android_sdk_version }})"
            git push --set-upstream origin "$REL_BRANCH"
          else
            echo "No changes to commit"
            # Ensure branch exists on remote
            if ! git ls-remote --exit-code --heads origin "$REL_BRANCH" >/dev/null 2>&1; then
              git push --set-upstream origin "$REL_BRANCH"
            fi
          fi
          echo "release_branch=$REL_BRANCH" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Stage RC-E2E: End-to-end validation on plugin source (iOS)
  # ===========================================================================
  # Reuses .github/workflows/ios-e2e.yml. Gates publish-rc. Aligns with
  # appsflyer-mobile-plugin-tooling/contracts/rc-release-contract.md#rc-e2e.
  # ===========================================================================

  run-e2e-ios:
    name: 🧪 RC-E2E iOS
    needs: [validate-release, prepare-branch]
    # skip_e2e=true short-circuits both platforms. publish-rc requires both
    # E2E results to be 'success', so a skip naturally blocks publish — that's
    # by design: skipping E2E is for iterative pipeline work, not for shipping.
    if: ${{ needs.validate-release.outputs.is_valid == 'true' && github.event.inputs.skip_e2e != 'true' }}
    uses: ./.github/workflows/ios-e2e.yml
    # Build E2E from the freshly-cut release branch so the version bumps
    # applied by prepare-branch (pubspec, podspec, native constants) are in
    # the APK/IPA under test. Without this, workflow_call inherits the
    # caller's SHA (development) and the bumps never reach the build.
    with:
      ref: ${{ needs.prepare-branch.outputs.release_branch }}
    secrets: inherit

  # ===========================================================================
  # Stage RC-E2E: End-to-end validation on plugin source (Android)
  # ===========================================================================
  # Reuses .github/workflows/android-e2e.yml.

  run-e2e-android:
    name: 🧪 RC-E2E Android
    needs: [validate-release, prepare-branch]
    if: ${{ needs.validate-release.outputs.is_valid == 'true' && github.event.inputs.skip_e2e != 'true' }}
    uses: ./.github/workflows/android-e2e.yml
    with:
      ref: ${{ needs.prepare-branch.outputs.release_branch }}
    secrets: inherit

  # ===========================================================================
  # Pre-publish gate: aggregate run-ci + RC-E2E iOS + RC-E2E Android.
  # ===========================================================================
  # Single explicit gate that publish-rc depends on. Pass rules:
  #   - run-ci         : success OR skipped (skip_unit / skip_builds OK)
  #   - run-e2e-ios    : success only (skipped blocks publish — by design)
  #   - run-e2e-android: success only (skipped blocks publish — by design)
  # Anything else (failure, cancelled) on any of the three fails the gate.
  # Asymmetry is intentional: skipping Lint/Test/Build is for fast iteration
  # of the rest of the pipeline; skipping E2E is also iteration-only and must
  # not ship.
  # ===========================================================================

  pre-publish-gate:
    name: 🛡️ Pre-publish Gate
    runs-on: ubuntu-latest
    needs: [validate-release, run-ci, run-e2e-ios, run-e2e-android]
    if: always() && needs.validate-release.outputs.is_valid == 'true'
    outputs:
      passed: ${{ steps.aggregate.outputs.passed }}
      ci_result: ${{ steps.aggregate.outputs.ci_result }}
      e2e_ios_result: ${{ steps.aggregate.outputs.e2e_ios_result }}
      e2e_android_result: ${{ steps.aggregate.outputs.e2e_android_result }}
    steps:
      - name: Aggregate pre-publish results
        id: aggregate
        env:
          CI_RESULT: ${{ needs.run-ci.result }}
          E2E_IOS_RESULT: ${{ needs.run-e2e-ios.result }}
          E2E_ANDROID_RESULT: ${{ needs.run-e2e-android.result }}
        run: |
          set -euo pipefail
          echo "Lint, Test & Build : $CI_RESULT"
          echo "RC-E2E iOS         : $E2E_IOS_RESULT"
          echo "RC-E2E Android     : $E2E_ANDROID_RESULT"

          ci_ok=false
          ios_ok=false
          android_ok=false

          if [[ "$CI_RESULT" == "success" || "$CI_RESULT" == "skipped" ]]; then
            ci_ok=true
          fi
          if [[ "$E2E_IOS_RESULT" == "success" ]]; then
            ios_ok=true
          fi
          if [[ "$E2E_ANDROID_RESULT" == "success" ]]; then
            android_ok=true
          fi

          {
            echo "ci_result=$CI_RESULT"
            echo "e2e_ios_result=$E2E_IOS_RESULT"
            echo "e2e_android_result=$E2E_ANDROID_RESULT"
          } >> "$GITHUB_OUTPUT"

          if $ci_ok && $ios_ok && $android_ok; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Pre-publish gate passed"
            exit 0
          fi

          echo "passed=false" >> "$GITHUB_OUTPUT"
          echo "❌ Pre-publish gate failed"
          $ci_ok      || echo "  - Lint, Test & Build did not pass ($CI_RESULT)"
          $ios_ok     || echo "  - RC-E2E iOS did not pass ($E2E_IOS_RESULT)"
          $android_ok || echo "  - RC-E2E Android did not pass ($E2E_ANDROID_RESULT)"
          exit 1

  # ===========================================================================
  # Stage RC-PUBLISH: Publish RC to pub.dev (moved earlier to gate side-effects)
  # ===========================================================================
  # Runs only after BOTH E2E workflows pass. Honors dry_run (default true).
  # Aligns with rc-release-contract.md#rc-publish. Side effects downstream
  # (prerelease tag, PR, Slack, Jira) depend on publish-rc succeeding so they
  # reflect a real published RC — or a documented dry run.
  # ===========================================================================

  # ===========================================================================
  # Job 4: Create Pre-Release
  # ===========================================================================
  # Creates a GitHub pre-release with the RC tag
  # ===========================================================================
  
  create-prerelease:
    name: 🏷️ Create Pre-Release
    runs-on: ubuntu-latest
    needs: [validate-release, prepare-branch, publish-rc]
    if: always() && needs.validate-release.outputs.is_rc == 'true' && needs.publish-rc.result == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-branch.outputs.release_branch }}
      
      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          
          # Extract changes from CHANGELOG.md for this version
          echo "Extracting release notes for version $VERSION"
          
          # Create release notes
          cat > release_notes.md << EOF
          # AppsFlyer Flutter Plugin - Release Candidate $VERSION
          
          ## 🚀 Release Candidate for Testing
          
          This is a pre-release version for QA testing. Please do not use in production.
          
          ## 📋 Changes
          
          Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for detailed changes.
          
          ## 🧪 Testing Instructions
          
          1. Add to your \`pubspec.yaml\`:
             \`\`\`yaml
             dependencies:
               appsflyer_sdk:
                 git:
                   url: https://github.com/${{ github.repository }}.git
                   ref: $VERSION
             \`\`\`
          
          2. Run \`flutter pub get\`
          3. Test the integration thoroughly
          4. Report any issues to the development team
          
          ## 📦 SDK Versions
          
          - Android AppsFlyer SDK: (check android/build.gradle)
          - iOS AppsFlyer SDK: (check ios/appsflyer_sdk.podspec)
          
          ---
          
          **Note**: This is a pre-release and should not be used in production applications.
          EOF
          
          echo "Release notes generated"
      
      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.version }}
          name: Release Candidate ${{ needs.validate-release.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: true  # Mark as pre-release
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Job 5: Notify Team (Placeholder for Slack Integration)
  # ===========================================================================
  # Sends notification to Slack channel about the RC release
  # ===========================================================================
  
  open-pr:
    name: 🔀 Open PR to master
    runs-on: ubuntu-latest
    needs: [validate-release, prepare-branch, publish-rc]
    if: always() && needs.publish-rc.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-branch.outputs.release_branch }}
      - name: Create or update PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate-release.outputs.base_version }}';
            const head = '${{ needs.prepare-branch.outputs.release_branch }}';
            const base = 'master';
            // Find existing PR
            const { data: prs } = await github.rest.pulls.list({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', head: `${context.repo.owner}:${head}` });
            const body = `### Release ${version}\n\n- Android SDK: ${{ needs.validate-release.outputs.android_sdk_version }}\n- iOS SDK: ${{ needs.validate-release.outputs.ios_sdk_version }}\n\nThis PR was opened by the RC workflow.`;
            if (prs.length > 0) {
              const pr = prs[0];
              await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, title: `Release ${version}`, body });
              core.setOutput('pr_number', pr.number);
            } else {
              const { data: pr } = await github.rest.pulls.create({ owner: context.repo.owner, repo: context.repo.repo, head, base, title: `Release ${version}`, body, maintainer_can_modify: true });
              core.setOutput('pr_number', pr.number);
            }

  publish-rc:
    name: 📦 Publish RC to pub.dev
    runs-on: ubuntu-latest
    needs: [validate-release, prepare-branch, pre-publish-gate]
    if: needs.validate-release.outputs.is_valid == 'true' && needs.pre-publish-gate.outputs.passed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-branch.outputs.release_branch }}
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Validate package (dry-run)
        run: |
          # Run dry-run and capture output
          # Exit code 65 = warnings only (acceptable for RC builds since CHANGELOG won't have -rcN suffix)
          # Exit code 0 = success
          # Other exit codes = real errors
          set +e
          flutter pub publish --dry-run
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Package validation passed with no warnings"
          elif [ $EXIT_CODE -eq 65 ]; then
            echo "⚠️ Package validation passed with warnings (expected for RC builds)"
            echo "Note: CHANGELOG warning for RC version suffix is expected"
          else
            echo "❌ Package validation failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
      - name: RC dry-run active — skipping publish
        if: ${{ needs.validate-release.outputs.is_dry_run == 'true' }}
        run: |
          echo "RC dry_run is true — will not publish to pub.dev."
      - name: Publish RC to pub.dev
        if: ${{ needs.validate-release.outputs.is_dry_run != 'true' }}
        env:
          PUB_DEV_CREDENTIALS: ${{ secrets.PUB_DEV_CREDENTIALS }}
        run: |
          if [[ -z "${PUB_DEV_CREDENTIALS}" ]]; then
            echo "PUB_DEV_CREDENTIALS is missing"; exit 1; fi
          mkdir -p ~/.config/dart
          echo "${PUB_DEV_CREDENTIALS}" > ~/.config/dart/pub-credentials.json
          flutter pub publish --force
          rm -f ~/.config/dart/pub-credentials.json

  notify-team:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - prepare-branch
      - run-ci
      - run-e2e-ios
      - run-e2e-android
      - pre-publish-gate
      - publish-rc
      - create-prerelease
    if: always()
    
    steps:
      # Order matters: status + legs are env-only and must run first so the
      # failure Slack always fires even when checkout / extract-info / Jira
      # are unhappy (network blip, partial release branch, Jira 5xx). The
      # checkout + enrichment steps below are gated on the success path,
      # because the failure payload doesn't need any filesystem state.
      - name: Determine status and failed stage
        id: status
        env:
          VALIDATE_RESULT: ${{ needs.validate-release.result }}
          PREPARE_RESULT: ${{ needs.prepare-branch.result }}
          GATE_RESULT: ${{ needs.pre-publish-gate.result }}
          PUBLISH_RESULT: ${{ needs.publish-rc.result }}
          PRERELEASE_RESULT: ${{ needs.create-prerelease.result }}
        run: |
          set -euo pipefail
          # Success means the full happy path completed: validate → prepare →
          # pre-publish-gate → publish-rc → create-prerelease.
          if [[ "$VALIDATE_RESULT" == "success" \
             && "$PREPARE_RESULT"   == "success" \
             && "$GATE_RESULT"      == "success" \
             && "$PUBLISH_RESULT"   == "success" \
             && "$PRERELEASE_RESULT" == "success" ]]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "failed_stage=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "success=false" >> "$GITHUB_OUTPUT"
          # Stage attribution: top-down, first non-success wins. Treat
          # 'skipped' on downstream jobs as "didn't run because upstream
          # failed" — the upstream stage owns the failure.
          if [[ "$VALIDATE_RESULT" != "success" ]]; then
            echo "failed_stage=validate-release" >> "$GITHUB_OUTPUT"
          elif [[ "$PREPARE_RESULT" != "success" ]]; then
            echo "failed_stage=prepare-branch" >> "$GITHUB_OUTPUT"
          elif [[ "$GATE_RESULT" != "success" ]]; then
            echo "failed_stage=pre-publish-gate" >> "$GITHUB_OUTPUT"
          elif [[ "$PUBLISH_RESULT" != "success" ]]; then
            echo "failed_stage=publish-rc" >> "$GITHUB_OUTPUT"
          else
            echo "failed_stage=create-prerelease" >> "$GITHUB_OUTPUT"
          fi

      - name: Format pre-publish leg results
        id: legs
        env:
          CI_RESULT: ${{ needs.run-ci.result }}
          E2E_IOS_RESULT: ${{ needs.run-e2e-ios.result }}
          E2E_ANDROID_RESULT: ${{ needs.run-e2e-android.result }}
        run: |
          set -euo pipefail
          # Map a result string to a Slack icon. CI accepts skipped as a pass
          # (skip_unit / skip_builds); E2E does not (skip_e2e is for fast
          # iteration only and must not ship).
          icon_for() {
            local kind="$1" result="$2"
            case "$result" in
              success) echo ":white_check_mark:" ;;
              skipped)
                if [[ "$kind" == "ci" ]]; then echo ":fast_forward:"; else echo ":x:"; fi ;;
              failure)   echo ":x:" ;;
              cancelled) echo ":no_entry_sign:" ;;
              *)         echo ":grey_question:" ;;
            esac
          }
          CI_ICON=$(icon_for ci "$CI_RESULT")
          IOS_ICON=$(icon_for e2e "$E2E_IOS_RESULT")
          ANDROID_ICON=$(icon_for e2e "$E2E_ANDROID_RESULT")
          {
            echo "ci_icon=$CI_ICON"
            echo "ios_icon=$IOS_ICON"
            echo "android_icon=$ANDROID_ICON"
            echo "ci_result=$CI_RESULT"
            echo "e2e_ios_result=$E2E_IOS_RESULT"
            echo "e2e_android_result=$E2E_ANDROID_RESULT"
          } >> "$GITHUB_OUTPUT"

      # Enrichment: only run on the success path. The failure Slack below
      # references no step outputs from these — only needs.*.result and
      # validate-release.outputs.version — so a checkout failure here cannot
      # silence the failure notification.
      - name: Checkout release branch
        if: steps.status.outputs.success == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-branch.outputs.release_branch }}

      - name: Extract SDK versions and changelog
        id: extract-info
        if: steps.status.outputs.success == 'true'
        run: |
          VERSION="${{ needs.validate-release.outputs.version }}"
          BASE_VERSION=$(echo "$VERSION" | sed 's/-rc[0-9]*$//')

          # Extract Android SDK version
          ANDROID_SDK_VERSION=$(grep "implementation 'com.appsflyer:af-android-sdk:" android/build.gradle | sed -n "s/.*af-android-sdk:\([^']*\).*/\1/p" | head -1)
          echo "android_sdk=$ANDROID_SDK_VERSION" >> $GITHUB_OUTPUT

          # Extract iOS SDK version
          IOS_SDK_VERSION=$(grep "s.ios.dependency 'AppsFlyerFramework'" ios/appsflyer_sdk.podspec | sed -n "s/.*AppsFlyerFramework',.*'\([^']*\)'.*/\1/p" | head -1)
          echo "ios_sdk=$IOS_SDK_VERSION" >> $GITHUB_OUTPUT

          # Extract Purchase Connector versions from build files
          ANDROID_PC_VERSION=$(grep "implementation 'com.appsflyer:purchase-connector:" android/build.gradle | sed -n "s/.*purchase-connector:\([^']*\).*/\1/p" | head -1)
          if [ -z "$ANDROID_PC_VERSION" ]; then
            ANDROID_PC_VERSION="N/A"
          fi
          echo "android_pc=$ANDROID_PC_VERSION" >> $GITHUB_OUTPUT

          IOS_PC_VERSION=$(grep "s.ios.dependency 'PurchaseConnector'" ios/appsflyer_sdk.podspec | sed -n "s/.*PurchaseConnector',.*'\([^']*\)'.*/\1/p" | head -1)
          if [ -z "$IOS_PC_VERSION" ]; then
            IOS_PC_VERSION="N/A"
          fi
          echo "ios_pc=$IOS_PC_VERSION" >> $GITHUB_OUTPUT

          # Extract changelog for this version (use base version without -rc suffix)
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(awk "/## $BASE_VERSION/,/^## [0-9]/" CHANGELOG.md | grep "^-" | sed 's/^- /• /' | head -5)
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="• Check CHANGELOG.md for details"
            fi
          else
            CHANGELOG="• Check release notes for details"
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fetch Jira tickets
        id: jira-tickets
        if: steps.status.outputs.success == 'true'
        continue-on-error: true  # Don't fail CI if Jira fetch fails
        run: |
          set +e  # Don't exit on errors

          VERSION="${{ needs.validate-release.outputs.version }}"
          # Remove -rc suffix for Jira lookup (e.g., 99.99.99-rc1 → 99.99.99)
          BASE_VERSION=$(echo "$VERSION" | sed 's/-rc[0-9]*$//')
          # Use base version with 'v' prefix (matches your Jira convention)
          JIRA_FIX_VERSION="Flutter SDK v$BASE_VERSION"

          echo "🔍 Looking for Jira tickets with fix version: $JIRA_FIX_VERSION"

          # Check if Jira credentials are available
          if [[ -z "${{ secrets.CI_JIRA_EMAIL }}" ]] || [[ -z "${{ secrets.CI_JIRA_TOKEN }}" ]]; then
            echo "⚠️ Jira credentials not configured"
            echo "tickets=No assigned fix version found" >> $GITHUB_OUTPUT
            exit 0
          fi

          JIRA_DOMAIN="${{ secrets.CI_JIRA_DOMAIN || 'appsflyer.atlassian.net' }}"

          # URL-encode the JQL query properly
          JQL_QUERY="fixVersion=\"${JIRA_FIX_VERSION}\""
          # Use curl's --data-urlencode for proper encoding
          ENCODED_JQL=$(echo "$JQL_QUERY" | jq -sRr @uri)

          echo "📡 Querying Jira API..."
          echo "Domain: $JIRA_DOMAIN"
          echo "JQL: $JQL_QUERY"

          # Query Jira API with error handling and verbose output
          # Using the new /search/jql endpoint as per Jira API v3
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "${{ secrets.CI_JIRA_EMAIL }}:${{ secrets.CI_JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://${JIRA_DOMAIN}/rest/api/3/search/jql?jql=${ENCODED_JQL}&fields=key,summary&maxResults=20")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠️ Jira API request failed with status $HTTP_CODE"
            echo "Response body (first 500 chars):"
            echo "$BODY" | head -c 500
            echo "tickets=No assigned fix version found" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract ticket keys and create links with summaries
          TICKETS=$(echo "$BODY" | jq -r '.issues[]? | "• https://'"${JIRA_DOMAIN}"'/browse/\(.key) - \(.fields.summary)"' 2>/dev/null | head -10)

          if [ -z "$TICKETS" ]; then
            echo "ℹ️ No linked tickets found for version: $JIRA_FIX_VERSION"
            echo "tickets=No assigned fix version found" >> $GITHUB_OUTPUT
          else
            echo "✅ Found Jira tickets:"
            echo "$TICKETS"
            echo "tickets<<EOF" >> $GITHUB_OUTPUT
            echo "$TICKETS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification (Success)
        # Skip during dry runs so iterative pipeline testing doesn't spam
        # the QA channel. Real RCs (is_dry_run=false) still post normally.
        if: steps.status.outputs.success == 'true' && needs.validate-release.outputs.is_dry_run != 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "<!here>\n:flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter:\n\n*Flutter Release Candidate:*\nappsflyer_sdk: ${{ needs.validate-release.outputs.version }} is ready for QA testing.\n\n*Pre-publish checks:*\n${{ steps.legs.outputs.ci_icon }} Lint, Test & Build: ${{ steps.legs.outputs.ci_result }}\n${{ steps.legs.outputs.ios_icon }} RC-E2E iOS: ${{ steps.legs.outputs.e2e_ios_result }}\n${{ steps.legs.outputs.android_icon }} RC-E2E Android: ${{ steps.legs.outputs.e2e_android_result }}\n\n:hourglass_flowing_sand: Smoke (`rc-smoke/pub.dev`) will auto-run once ${{ needs.validate-release.outputs.version }} appears on pub.dev (typically 1-5 min).\n\n*Testing Instructions:*\nAdd to pubspec.yaml:\n```\ndependencies:\n  appsflyer_sdk:\n    git:\n      url: https://github.com/${{ github.repository }}.git\n      ref: ${{ needs.validate-release.outputs.version }}\n```\n\n*Sources:*\n:github: https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}\n:github: Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.validate-release.outputs.version }}\n:github: Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*Changes and fixes:*\n${{ steps.extract-info.outputs.changelog }}\n\n*Linked tickets and issues:*\n${{ steps.jira-tickets.outputs.tickets }}\n\n*Native SDK's:*\n:android: ${{ steps.extract-info.outputs.android_sdk }}\n:apple: ${{ steps.extract-info.outputs.ios_sdk }}\n\n*Purchase Connector:*\n:android: ${{ steps.extract-info.outputs.android_pc }}\n:apple: ${{ steps.extract-info.outputs.ios_pc }}\n\n:flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter::flutter:"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}

      - name: Send failure notification
        # Skip during dry runs so iterative pipeline testing doesn't spam
        # the QA channel. Real RCs (is_dry_run=false) still post normally.
        if: steps.status.outputs.success == 'false' && needs.validate-release.outputs.is_dry_run != 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "<!here>\n:warning: *Flutter RC failed at `${{ steps.status.outputs.failed_stage }}`*\n\nVersion: ${{ needs.validate-release.outputs.version }}\nBranch: ${{ github.ref_name }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*Pre-publish checks:*\n${{ steps.legs.outputs.ci_icon }} Lint, Test & Build: ${{ steps.legs.outputs.ci_result }}\n${{ steps.legs.outputs.ios_icon }} RC-E2E iOS: ${{ steps.legs.outputs.e2e_ios_result }}\n${{ steps.legs.outputs.android_icon }} RC-E2E Android: ${{ steps.legs.outputs.e2e_android_result }}\n\n*Downstream stages:*\n• prepare-branch: ${{ needs.prepare-branch.result }}\n• pre-publish-gate: ${{ needs.pre-publish-gate.result }}\n• publish-rc: ${{ needs.publish-rc.result }}\n• create-prerelease: ${{ needs.create-prerelease.result }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}

  # ===========================================================================
  # Job 6: RC Summary
  # ===========================================================================
  # Provides a summary of the RC release process
  # ===========================================================================
  
  rc-summary:
    name: 📋 RC Summary
    runs-on: ubuntu-latest
    needs: [validate-release, run-ci, prepare-branch, run-e2e-ios, run-e2e-android, pre-publish-gate, publish-rc, create-prerelease]
    if: always()
    
    steps:
      - name: Display RC Summary
        run: |
          echo "========================================="
          echo "RC Release Summary"
          echo "========================================="
          echo "Version: ${{ needs.validate-release.outputs.version }}"
          echo "Dry Run: ${{ needs.validate-release.outputs.is_dry_run }}"
          echo "-----------------------------------------"
          echo "RC-PREP validate:     ${{ needs.validate-release.result }}"
          echo "Lint, Test & Build:   ${{ needs.run-ci.result }}  (gated via pre-publish-gate; skipped passes)"
          echo "RC-PREP branch:       ${{ needs.prepare-branch.result }}"
          echo "RC-E2E iOS:           ${{ needs.run-e2e-ios.result }}"
          echo "RC-E2E Android:       ${{ needs.run-e2e-android.result }}"
          echo "Pre-publish gate:     ${{ needs.pre-publish-gate.result }}"
          echo "RC-PUBLISH:           ${{ needs.publish-rc.result }}"
          echo "Pre-release tag + PR: ${{ needs.create-prerelease.result }}"
          echo "========================================="
          echo ""
          echo "Next stage: rc-smoke.yml fires automatically via workflow_run"
          echo "when publish-rc succeeds with dry_run=false. On success it posts"
          echo "rc-smoke/pub.dev check-run on the release branch head SHA."
          echo "See appsflyer-mobile-plugin-tooling/contracts/rc-release-contract.md"
          echo "for the full stage table."
          echo ""

          if [[ "${{ needs.validate-release.result }}" == "success" ]] && \
             [[ "${{ needs.pre-publish-gate.result }}" == "success" ]] && \
             [[ "${{ needs.publish-rc.result }}" == "success" ]] && \
             [[ "${{ needs.create-prerelease.result }}" == "success" ]]; then
            echo "✅ RC Release Process Completed Successfully"
          else
            echo "❌ RC Release Process Failed"
            echo "Please check the logs above for details"
            exit 1
          fi
